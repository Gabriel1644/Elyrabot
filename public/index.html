<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Kaius · Dashboard</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;
  --surface:#111118;
  --card:#16161f;
  --border:#1e1e2e;
  --accent:#00e676;
  --accent2:#00bcd4;
  --red:#ff5370;
  --orange:#ffb74d;
  --purple:#b39ddb;
  --text:#e0e0e0;
  --muted:#6b7280;
  --dim:#2d2d3d;
  --radius:10px;
  --sidebar:220px;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:9px}
a{color:var(--accent);text-decoration:none}
code,.mono{font-family:'JetBrains Mono',monospace;font-size:.82em}

/* ── Layout ── */
.layout{display:flex;min-height:100vh}

/* ── Sidebar ── */
#sidebar{
  width:var(--sidebar);
  min-height:100vh;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;z-index:50;
  transition:transform .25s ease;
}
.sb-logo{
  display:flex;align-items:center;gap:10px;
  padding:16px 14px;
  border-bottom:1px solid var(--border);
}
.sb-logo-icon{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.sb-logo-icon svg{width:18px;height:18px;fill:#000}
.sb-logo-text{font-weight:700;font-size:.95rem;color:var(--text)}
.sb-logo-ver{font-size:.68rem;color:var(--muted);font-family:'JetBrains Mono',monospace}

.sb-status{
  margin:8px 10px;
  padding:7px 10px;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:var(--radius);
  display:flex;align-items:center;gap:8px;
  font-family:'JetBrains Mono',monospace;
  font-size:.72rem;color:var(--muted);
}
.status-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--dim);flex-shrink:0;
  transition:background .3s;
}
.status-dot.online{background:var(--accent);box-shadow:0 0 6px var(--accent);animation:blink 2s infinite}
.status-dot.offline{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

nav{flex:1;padding:8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-item{
  display:flex;align-items:center;gap:9px;
  padding:9px 10px;border-radius:8px;
  color:var(--muted);font-size:.85rem;font-weight:500;
  cursor:pointer;transition:all .15s;border:none;background:none;
  text-align:left;width:100%;
}
.nav-item:hover{background:var(--card);color:var(--text)}
.nav-item.active{background:rgba(0,230,118,.1);color:var(--accent);font-weight:600}
.nav-item.active::before{
  content:'';position:absolute;left:0;width:3px;height:24px;
  background:var(--accent);border-radius:0 3px 3px 0;
}
.nav-item{position:relative}
.nav-icon{width:16px;height:16px;flex-shrink:0;opacity:.7}
.nav-item.active .nav-icon,.nav-item:hover .nav-icon{opacity:1}

.sb-footer{
  padding:10px 14px;
  border-top:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
}
.sb-close{display:none;background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;border-radius:6px;flex-shrink:0}

/* ── Main ── */
.main{
  margin-left:var(--sidebar);
  flex:1;display:flex;flex-direction:column;min-height:100vh;
}
.topbar{
  height:52px;display:flex;align-items:center;gap:12px;
  padding:0 20px;background:var(--surface);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:40;
}
#menu-btn{display:none;background:none;border:none;color:var(--muted);cursor:pointer;padding:6px;border-radius:6px}
.topbar-title{font-size:.95rem;font-weight:600;flex:1}
.conn-badge{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:99px;
  background:var(--card);border:1px solid var(--border);
  font-size:.72rem;font-family:'JetBrains Mono',monospace;color:var(--muted);
}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:blink 2s infinite}
.conn-dot.off{background:var(--red);animation:none}

#page{flex:1;padding:20px;max-width:1300px;width:100%;margin:0 auto;animation:fadein .2s ease}
@keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* ── Overlay ── */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:45;backdrop-filter:blur(2px)}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:.88rem;font-weight:600;display:flex;align-items:center;gap:7px}
.card-title svg{width:14px;height:14px;color:var(--accent);flex-shrink:0}

/* ── Grid ── */
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.gauto{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}

/* ── Stat cards ── */
.stat{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;display:flex;flex-direction:column;gap:6px;transition:border-color .2s;
}
.stat:hover{border-color:var(--dim)}
.stat-icon{
  width:34px;height:34px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;margin-bottom:4px;
}
.stat-icon svg{width:17px;height:17px}
.si-g{background:rgba(0,230,118,.12);color:var(--accent)}
.si-b{background:rgba(0,188,212,.12);color:var(--accent2)}
.si-o{background:rgba(255,183,77,.12);color:var(--orange)}
.si-p{background:rgba(179,157,219,.12);color:var(--purple)}
.si-r{background:rgba(255,83,112,.12);color:var(--red)}
.stat-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.stat-val{font-size:1.7rem;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 13px;border-radius:7px;font-size:.82rem;
  font-weight:500;font-family:'Inter',sans-serif;
  cursor:pointer;border:1px solid transparent;transition:all .15s;white-space:nowrap;
}
.btn svg{width:13px;height:13px;flex-shrink:0}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.btn-primary:hover{background:#00c864;border-color:#00c864}
.btn-secondary{background:var(--card);color:var(--text);border-color:var(--border)}
.btn-secondary:hover{background:var(--dim);border-color:var(--muted)}
.btn-danger{background:rgba(255,83,112,.12);color:var(--red);border-color:var(--red)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-ghost{background:transparent;color:var(--muted);border-color:transparent}
.btn-ghost:hover{background:var(--card);color:var(--text)}
.btn-sm{padding:5px 9px;font-size:.76rem}
.btn-block{width:100%;justify-content:center}
.btn:disabled{opacity:.4;cursor:not-allowed}
.icon-btn{
  background:none;border:none;color:var(--muted);cursor:pointer;
  padding:5px;border-radius:6px;display:flex;align-items:center;
  transition:all .15s;
}
.icon-btn:hover{background:var(--card);color:var(--text)}
.icon-btn svg{width:16px;height:16px}

/* ── Forms ── */
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.form-label{font-size:.76rem;font-weight:500;color:var(--muted)}
.form-input,.form-select,.form-textarea{
  background:var(--bg);border:1px solid var(--border);border-radius:7px;
  color:var(--text);font-family:'Inter',sans-serif;font-size:.85rem;
  padding:8px 11px;width:100%;transition:border-color .15s;outline:none;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,230,118,.1)}
.form-input::placeholder{color:var(--dim)}
.form-textarea{resize:vertical;min-height:80px;font-family:'JetBrains Mono',monospace;font-size:.8rem}
.form-select{cursor:pointer}
.form-hint{font-size:.72rem;color:var(--dim)}
.form-row{display:flex;gap:10px}
.form-row .form-group{flex:1}

/* ── Toggle ── */
.toggle-wrap{display:flex;align-items:center;gap:9px;cursor:pointer}
.toggle{position:relative;width:36px;height:19px;flex-shrink:0}
.toggle input{display:none}
.toggle-track{
  display:block;width:36px;height:19px;
  background:var(--border);border-radius:99px;cursor:pointer;transition:background .2s;
}
.toggle input:checked+.toggle-track{background:var(--accent)}
.toggle-track::after{
  content:'';position:absolute;top:2.5px;left:2.5px;
  width:14px;height:14px;background:#fff;border-radius:50%;transition:transform .2s;
}
.toggle input:checked+.toggle-track::after{transform:translateX(17px)}
.toggle-label{font-size:.85rem;color:var(--text)}

/* ── Badge ── */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 7px;border-radius:99px;
  font-size:.68rem;font-weight:600;white-space:nowrap;
}
.badge-g{background:rgba(0,230,118,.12);color:var(--accent)}
.badge-b{background:rgba(0,188,212,.12);color:var(--accent2)}
.badge-r{background:rgba(255,83,112,.12);color:var(--red)}
.badge-o{background:rgba(255,183,77,.12);color:var(--orange)}
.badge-p{background:rgba(179,157,219,.12);color:var(--purple)}
.badge-gray{background:var(--dim);color:var(--muted)}

/* ── Tables ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{
  text-align:left;padding:7px 10px;color:var(--muted);
  font-weight:500;font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;
  border-bottom:1px solid var(--border);white-space:nowrap;
}
td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.015)}
tr:last-child td{border-bottom:none}

/* ── Toast ── */
#toasts{
  position:fixed;bottom:20px;right:20px;
  display:flex;flex-direction:column;gap:8px;z-index:999;max-width:310px;
}
.toast{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:11px 13px;display:flex;align-items:flex-start;gap:9px;
  box-shadow:0 8px 24px rgba(0,0,0,.4);animation:tin .2s ease;
  border-left:3px solid var(--muted);cursor:pointer;
}
.toast.ok{border-left-color:var(--accent)}
.toast.err{border-left-color:var(--red)}
.toast.warn{border-left-color:var(--orange)}
.toast.info{border-left-color:var(--accent2)}
.toast-icon{width:15px;height:15px;flex-shrink:0;margin-top:1px}
.toast.ok .toast-icon{color:var(--accent)}
.toast.err .toast-icon{color:var(--red)}
.toast.warn .toast-icon{color:var(--orange)}
.toast.info .toast-icon{color:var(--accent2)}
.toast-title{font-size:.82rem;font-weight:600}
.toast-msg{font-size:.75rem;color:var(--muted);margin-top:2px}
@keyframes tin{from{transform:translateX(20px);opacity:0}to{opacity:1}}
@keyframes tout{to{transform:translateX(30px);opacity:0}}

/* ── Modal ── */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  display:flex;align-items:center;justify-content:center;
  z-index:200;padding:16px;backdrop-filter:blur(3px);
}
.modal{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:22px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;
  box-shadow:0 24px 48px rgba(0,0,0,.5);animation:mup .2s ease;
}
.modal-wide{max-width:720px}
@keyframes mup{from{transform:translateY(12px);opacity:0}to{opacity:1}}
.modal-hdr{display:flex;align-items:center;gap:9px;margin-bottom:16px}
.modal-hdr h3{font-size:1rem;font-weight:600}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}

/* ── Log stream ── */
.logstream{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);
  padding:10px;font-family:'JetBrains Mono',monospace;font-size:.75rem;
  height:500px;overflow-y:auto;line-height:1.9;
}
.log-line{display:flex;gap:8px;align-items:baseline;padding:1px 0}
.log-time{color:var(--dim);font-size:.68rem;flex-shrink:0;min-width:58px}
.log-type{font-size:.66rem;font-weight:700;padding:1px 5px;border-radius:3px;flex-shrink:0;min-width:38px;text-align:center}
.lt-INFO{background:rgba(0,188,212,.15);color:var(--accent2)}
.lt-CMD{background:rgba(0,230,118,.15);color:var(--accent)}
.lt-WARN{background:rgba(255,183,77,.15);color:var(--orange)}
.lt-ERROR{background:rgba(255,83,112,.15);color:var(--red)}
.lt-BOT{background:rgba(179,157,219,.15);color:var(--purple)}
.lt-DEBUG{background:var(--dim);color:var(--muted)}
.log-msg{color:var(--text);word-break:break-word;flex:1}

/* ── Sections ── */
.sec{margin-bottom:20px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-size:.88rem;font-weight:600;display:flex;align-items:center;gap:7px}
.sec-title svg{width:15px;height:15px;color:var(--accent)}

/* ── Tabs ── */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:18px;overflow-x:auto}
.tab-btn{
  padding:9px 15px;background:none;border:none;font-size:.83rem;
  font-family:'Inter',sans-serif;font-weight:500;color:var(--muted);
  cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;
}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-panel{display:none}
.tab-panel.active{display:block;animation:fadein .18s ease}

/* ── Progress bar ── */
.prog{height:4px;background:var(--border);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:var(--accent);transition:width .5s ease}
.prog-fill.blue{background:var(--accent2)}
.prog-fill.red{background:var(--red)}
.prog-fill.orange{background:var(--orange)}

/* ── Empty state ── */
.empty{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:40px 16px;gap:10px;text-align:center;color:var(--dim);
}
.empty svg{width:36px;height:36px;opacity:.35}
.empty p{font-size:.82rem;color:var(--muted)}

/* ── Loading ── */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;gap:10px;color:var(--muted)}
.spin{
  width:18px;height:18px;border:2px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Alert ── */
.alert{padding:11px 13px;border-radius:7px;font-size:.82rem;display:flex;gap:9px;border:1px solid transparent}
.alert svg{width:15px;height:15px;flex-shrink:0;margin-top:1px}
.alert-info{background:rgba(0,188,212,.08);border-color:rgba(0,188,212,.3);color:var(--accent2)}
.alert-warn{background:rgba(255,183,77,.08);border-color:rgba(255,183,77,.3);color:var(--orange)}
.alert-danger{background:rgba(255,83,112,.08);border-color:rgba(255,83,112,.3);color:var(--red)}
.alert-ok{background:rgba(0,230,118,.08);border-color:rgba(0,230,118,.3);color:var(--accent)}

/* ── Cmd card ── */
.cmd-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px;display:flex;flex-direction:column;gap:8px;transition:border-color .15s;
}
.cmd-card:hover{border-color:var(--dim)}
.cmd-card.disabled{opacity:.5}
.cmd-name{font-family:'JetBrains Mono',monospace;font-size:.88rem;font-weight:600;color:var(--accent)}
.cmd-desc{font-size:.78rem;color:var(--muted);flex:1}
.cmd-meta{display:flex;flex-wrap:wrap;gap:5px}
.cmd-prio{
  display:flex;align-items:center;gap:4px;
  padding:5px 0;margin-top:4px;border-top:1px solid var(--border);
}
.cmd-prio-val{
  font-family:'JetBrains Mono',monospace;font-size:.78rem;
  min-width:24px;text-align:center;
}
.cmd-actions{display:flex;gap:4px;margin-top:4px}

/* ── Hook item ── */
.hook-item{
  display:flex;align-items:center;gap:12px;padding:11px 13px;
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  transition:border-color .15s;
}
.hook-item:hover{border-color:var(--dim)}
.hook-name{font-weight:600;font-size:.85rem}
.hook-url{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:240px}

/* ── User card ── */
.user-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px;display:flex;align-items:center;gap:10px;
}
.user-avatar{
  width:36px;height:36px;border-radius:50%;background:rgba(0,230,118,.12);
  color:var(--accent);display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.8rem;flex-shrink:0;font-family:'JetBrains Mono',monospace;
}
.user-num{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted)}

/* ── Chart ── */
.chart-bars{display:flex;align-items:flex-end;height:150px;gap:5px;padding:0 2px}
.chart-bar-grp{flex:1;display:flex;align-items:flex-end;gap:2px}
.chart-bar{flex:1;border-radius:3px 3px 0 0;min-height:2px;transition:height .4s ease}
.bar-msgs{background:var(--accent2);opacity:.8}
.bar-cmds{background:var(--accent);opacity:.9}
.chart-labels{display:flex;gap:5px;padding:4px 2px 0}
.chart-lbl{flex:1;font-size:.62rem;color:var(--dim);text-align:center;font-family:'JetBrains Mono',monospace}

/* ── Auth overlay ── */
#auth-screen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;z-index:500;
}
.auth-box{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:28px;width:100%;max-width:360px;text-align:center;
}
.auth-box h2{margin:12px 0 6px;font-size:1.2rem}
.auth-box p{color:var(--muted);font-size:.85rem;margin-bottom:20px}

/* ── Mobile ── */
@media(max-width:768px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,.5)}
  #overlay.open{display:block}
  .main{margin-left:0}
  .sb-close{display:flex;align-items:center}
  #menu-btn{display:flex}
  #page{padding:14px}
  .g4,.g3{grid-template-columns:repeat(2,1fr)}
  .g2{grid-template-columns:1fr}
  .form-row{flex-direction:column}
  #toasts{left:12px;right:12px;max-width:none;bottom:12px}
}
@media(max-width:480px){
  .g4,.g3,.g2{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- Auth screen -->
<div id="auth-screen" style="display:none">
  <div class="auth-box">
    <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin:0 auto;display:block">

<script>
// ═══════════════════════════════════════════════════════════
//  KAIUS DASHBOARD — Single File SPA
//  Tudo em um único arquivo. Sem dependências de ordem.
// ═══════════════════════════════════════════════════════════

// ── Estado global ─────────────────────────────────────────
const S = {
  token:    localStorage.getItem('k_tok') || '',
  logs:     [],
  cmds:     [],
  page:     '',
  online:   false,
  socket:   null,
  newLogs:  0,
};

// ── API helper ────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (S.token) opts.headers['x-token'] = S.token;
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (res.status === 401) { showAuth(); throw new Error('Unauthorized'); }
  const ct = res.headers.get('content-type') || '';
  const data = ct.includes('json') ? await res.json() : { ok: res.ok };
  if (!res.ok && data.error) throw new Error(data.error);
  return data;
}
const GET    = p     => api('GET', p);
const POST   = (p,b) => api('POST', p, b);
const PUT    = (p,b) => api('PUT', p, b);
const DEL    = p     => api('DELETE', p);

// ── Toast ─────────────────────────────────────────────────
const ICO = {
  ok:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`,
  err:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
  warn: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
  info: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`,
};

function toast(type, title, msg='', ms=3500) {
  const box = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span class="toast-icon">${ICO[type]||ICO.info}</span><div><div class="toast-title">${esc(title)}</div>${msg?`<div class="toast-msg">${esc(msg)}</div>`:''}</div>`;
  box.appendChild(el);
  const rm = () => { el.style.animation='tout .2s ease forwards'; setTimeout(()=>el.remove(),200); };
  const t = setTimeout(rm, ms);
  el.addEventListener('click', ()=>{ clearTimeout(t); rm(); });
}
const ok   = (t,m) => toast('ok',   t, m);
const err  = (t,m) => toast('err',  t, m);
const warn = (t,m) => toast('warn', t, m);
const info = (t,m) => toast('info', t, m);

// ── Auth ──────────────────────────────────────────────────
function showAuth() {
  document.getElementById('auth-screen').style.display='flex';
}
function hideAuth() {
  document.getElementById('auth-screen').style.display='none';
}
async function doAuth() {
  const pass = document.getElementById('auth-input').value.trim();
  if (!pass) return;
  S.token = pass;
  localStorage.setItem('k_tok', pass);
  try {
    await GET('/api/status');
    hideAuth();
    ok('Autenticado!');
    navigate(S.page || 'dashboard');
  } catch(e) {
    if (e.message === 'Unauthorized') {
      document.getElementById('auth-err').style.display='block';
      S.token=''; localStorage.removeItem('k_tok');
    }
  }
}
document.getElementById('auth-input').addEventListener('keydown', e => {
  if (e.key==='Enter') doAuth();
});

// ── Utilitários ───────────────────────────────────────────
function esc(s='') {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtTime(ts) {
  if (!ts) return '--:--';
  const d = new Date(ts);
  return d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
function fmtDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
}
function fmtBytes(b=0) {
  if (b<1024) return b+'B';
  if (b<1048576) return (b/1024).toFixed(1)+'KB';
  if (b<1073741824) return (b/1048576).toFixed(1)+'MB';
  return (b/1073741824).toFixed(1)+'GB';
}
function prog(pct, cls='') {
  return `<div class="prog"><div class="prog-fill ${cls}" style="width:${Math.min(100,pct)}%"></div></div>`;
}
function catBadge(cat) {
  const m={core:'b',fun:'p',info:'b',media:'o',admin:'o',owner:'r',rpg:'o',misc:'gray',games:'p'};
  return `<span class="badge badge-${m[cat]||'gray'}">${esc(cat)}</span>`;
}

// ── Modal helper ──────────────────────────────────────────
function modal({title, body, footer='', wide=false, icon=ICO.info}) {
  const id = 'modal_'+Date.now();
  const el = document.createElement('div');
  el.className = 'modal-bg';
  el.id = id;
  el.innerHTML = `
    <div class="modal${wide?' modal-wide':''}">
      <div class="modal-hdr">
        <span style="width:18px;height:18px;flex-shrink:0">${icon}</span>
        <h3>${esc(title)}</h3>
        <button class="icon-btn" style="margin-left:auto" onclick="document.getElementById('${id}').remove()">
          ${ICO.err}
        </button>
      </div>
      <div class="modal-body">${body}</div>
      ${footer?`<div class="modal-footer">${footer}</div>`:''}
    </div>`;
  document.body.appendChild(el);
  el.addEventListener('click', e => { if(e.target===el) el.remove(); });
  return { el, id, close: ()=>el.remove() };
}

// ── Sidebar toggle ────────────────────────────────────────
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ── Socket.io ─────────────────────────────────────────────
function initSocket() {
  if (S.socket) return;
  try {
    S.socket = io({ transports: ['websocket','polling'] });
  } catch(e) {
    console.warn('[Socket] Falha:', e.message);
    return;
  }

  const connDot = document.getElementById('conn-dot');
  const connTxt = document.getElementById('conn-txt');

  S.socket.on('connect', () => {
    connDot.classList.remove('off');
    connTxt.textContent = 'online';
  });
  S.socket.on('disconnect', () => {
    connDot.classList.add('off');
    connTxt.textContent = 'offline';
    setStatus(false, 'Desconectado');
  });
  S.socket.on('init', ({ logs=[], commands=[] }) => {
    S.logs = logs;
    S.cmds = commands;
    if (S.page==='logs') renderLogs();
    if (S.page==='commands') renderCommands();
  });
  S.socket.on('status', data => {
    setStatus(true, data.nome || 'Online');
    if (data.versao) document.getElementById('ver-badge').textContent = 'v'+data.versao;
    if (S.page==='dashboard') renderDashboard();
  });
  S.socket.on('log', entry => {
    S.logs.push(entry);
    if (S.logs.length>600) S.logs.shift();
    if (S.page==='logs') appendLog(entry);
    else {
      S.newLogs++;
      const b = document.getElementById('log-badge');
      b.style.display='inline';
      b.textContent = S.newLogs>99?'99+':S.newLogs;
    }
  });
  S.socket.on('reload', ({ total }) => {
    ok('Comandos recarregados', total+' carregados');
  });
  S.socket.on('pairing_code', data => {
    const code = data.code || data;
    info('Código de pareamento', code);
    document.getElementById('pair-code-out') &&
      (document.getElementById('pair-code-out').innerHTML =
        `<div class="alert alert-ok" style="font-size:1.4rem;letter-spacing:4px;font-family:'JetBrains Mono',monospace;justify-content:center">${esc(code)}</div>`);
  });
}

function setStatus(online, name) {
  S.online = online;
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-txt');
  dot.className = 'status-dot ' + (online?'online':'offline');
  txt.textContent = name || (online?'Online':'Offline');
}

// ── Router ────────────────────────────────────────────────
const TITLES = {
  dashboard:'Dashboard', logs:'Logs ao Vivo', commands:'Comandos',
  automations:'Automações', webhooks:'Webhooks', groups:'Grupos',
  users:'Usuários', bang:'⚡ Ações Rápidas', config:'Configurações', system:'Sistema',
};
const RENDERS = {
  dashboard: renderDashboard, logs: renderLogs, commands: renderCommands,
  automations: renderAutomations, webhooks: renderWebhooks, groups: renderGroups,
  users: renderUsers, bang: renderBang, config: renderConfig, system: renderSystem,
};

function navigate(page) {
  if (!RENDERS[page]) page = 'dashboard';
  S.page = page;
  history.replaceState(null,'','#'+page);
  document.getElementById('page-title').textContent = TITLES[page]||page;
  document.title = (TITLES[page]||page)+' · Kaius';
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page===page);
  });
  if (page==='logs') { S.newLogs=0; document.getElementById('log-badge').style.display='none'; }
  if (window.innerWidth<=768) closeSidebar();
  const p = document.getElementById('page');
  p.innerHTML = '<div class="loading"><div class="spin"></div></div>';
  RENDERS[page]();
}

// Nav click
document.getElementById('sidebar-nav').addEventListener('click', e => {
  const btn = e.target.closest('.nav-item');
  if (btn?.dataset.page) navigate(btn.dataset.page);
});

// ── Reload ────────────────────────────────────────────────
async function reloadCmds() {
  try {
    const r = await POST('/api/reload');
    ok('Recarregado', r.total+' comandos');
    S.cmds = [];
  } catch(e) { err('Erro', e.message); }
}

function renderLogs() {
  const p = document.getElementById('page');
  p.innerHTML = `
    <div class="card">
      <div class="card-hdr">
        <span class="card-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Stream ao Vivo</span>
        <div style="display:flex;gap:6px;align-items:center">
          <span id="log-cnt" style="font-size:.72rem;font-family:'JetBrains Mono',monospace;color:var(--muted)">0</span>
          <button class="btn btn-sm btn-secondary" id="auto-scroll-btn" onclick="toggleAutoScroll()">📌 ON</button>
          <button class="btn btn-sm btn-secondary" onclick="clearLogs()">Limpar</button>
        </div>
      </div>
      <div class="form-row" style="margin-bottom:10px;gap:8px">
        <input class="form-input" id="log-search" placeholder="🔍 Filtrar..." style="flex:1" oninput="filterLogs()">
        <select class="form-select" id="log-type" style="width:110px" onchange="filterLogs()">
          <option value="">Todos</option>
          <option value="INFO">INFO</option>
          <option value="CMD">CMD</option>
          <option value="WARN">WARN</option>
          <option value="ERROR">ERROR</option>
          <option value="BOT">BOT</option>
        </select>
      </div>
      <div class="logstream" id="logstream"></div>
    </div>`;

  window._autoScroll = true;
  buildLogStream();

  const stream = document.getElementById('logstream');
  stream.addEventListener('scroll', () => {
    const near = stream.scrollHeight - stream.scrollTop - stream.clientHeight < 50;
    window._autoScroll = near;
    document.getElementById('auto-scroll-btn').textContent = '📌 '+(near?'ON':'OFF');
  });
}

function toggleAutoScroll() {
  window._autoScroll = !window._autoScroll;
  document.getElementById('auto-scroll-btn').textContent = '📌 '+(window._autoScroll?'ON':'OFF');
  if (window._autoScroll) scrollLogs();
}

function buildLogStream() {
  const el = document.getElementById('logstream');
  if (!el) return;
  const q = (document.getElementById('log-search')?.value||'').toLowerCase();
  const t = document.getElementById('log-type')?.value||'';
  el.innerHTML = '';
  const filtered = S.logs.filter(l => {
    if (t && (l.type||'INFO').toUpperCase() !== t) return false;
    if (q && !(l.msg||l.message||'').toLowerCase().includes(q)) return false;
    return true;
  }).slice(-400);
  filtered.forEach(l => el.appendChild(makeLogLine(l)));
  updateLogCount();
  scrollLogs();
}

function makeLogLine(entry) {
  const type = (entry.type||'INFO').toUpperCase();
  const div = document.createElement('div');
  div.className = 'log-line';
  div.dataset.type = type;
  div.dataset.msg = (entry.msg||entry.message||'').toLowerCase();
  div.innerHTML = `<span class="log-time">${fmtTime(entry.time||entry.timestamp||Date.now())}</span><span class="log-type lt-${type}">${type}</span><span class="log-msg">${esc(entry.msg||entry.message||'')}</span>`;
  return div;
}

function appendLog(entry) {
  if (document.getElementById('page-title')?.textContent !== 'Logs ao Vivo') return;
  const el = document.getElementById('logstream');
  if (!el) return;
  const q = (document.getElementById('log-search')?.value||'').toLowerCase();
  const t = document.getElementById('log-type')?.value||'';
  const type = (entry.type||'INFO').toUpperCase();
  const msg = (entry.msg||entry.message||'').toLowerCase();
  if (t && type !== t) return;
  if (q && !msg.includes(q)) return;
  el.appendChild(makeLogLine(entry));
  const lines = el.querySelectorAll('.log-line');
  if (lines.length > 500) lines[0].remove();
  updateLogCount();
  if (window._autoScroll) scrollLogs();
}

function scrollLogs() {
  const el = document.getElementById('logstream');
  if (el) el.scrollTop = el.scrollHeight;
}
function updateLogCount() {
  const el = document.getElementById('log-cnt');
  if (el) el.textContent = document.getElementById('logstream')?.querySelectorAll('.log-line').length||0;
}
function clearLogs() { S.logs=[]; buildLogStream(); }
function filterLogs() { buildLogStream(); }

async function loadCmds() {
  try {
    S.cmds = await GET('/api/commands');

}

function filterCmds() {
  _filter = document.getElementById('cmd-search')?.value.trim().toLowerCase()||'';
  _cat = document.getElementById('cmd-cat')?.value||'all';
  renderCmdGrid();
}

function renderCmdGrid() {
  const el = document.getElementById('cmd-grid');
  if (!el) return;
  const filtered = S.cmds.filter(c => {
    if (_cat!=='all' && c.category!==_cat) return false;
    if (_filter && !c.name.includes(_filter) && !(c.description||'').toLowerCase().includes(_filter)) return false;
    return true;
  });
  const tot = document.getElementById('cmd-total');
  if (tot) tot.textContent = `${filtered.length}/${S.cmds.length}`;
  if (!filtered.length) { el.innerHTML=`<div class="empty" style="grid-column:1/-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg><p>Nenhum comando encontrado</p></div>`; return; }

    <div class="cmd-card${c.enabled===false?' disabled':''}" id="cc-${esc(c.name)}">

        </label>
      </div>

      <div class="cmd-meta">
        ${catBadge(c.category)}
        ${c.cooldown?`<span class="badge badge-gray">${c.cooldown}s</span>`:''}
        ${(c.priority||0)>0?`<span class="badge badge-p">P${c.priority}</span>`:''}
      </div>
      <div class="cmd-prio">
        <span style="font-size:.7rem;color:var(--muted);flex:1">Prioridade</span>
        <button class="icon-btn" style="font-size:.95rem;padding:2px 6px" onclick="changePrio('${esc(c.name)}',-1)">−</button>
        <span class="cmd-prio-val" id="pv-${esc(c.name)}">${c.priority||0}</span>
        <button class="icon-btn" style="font-size:.95rem;padding:2px 6px" onclick="changePrio('${esc(c.name)}',+1)">+</button>
      </div>
      <div class="cmd-actions">
        <button class="btn btn-ghost btn-sm" onclick="editCmd('${esc(c.name)}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg> Editar</button>

        <button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="delCmd('${esc(c.name)}')" ${['ping','menu','ia'].includes(c.name)?'disabled':''}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg></button>
      </div>
    </div>`).join('');
}

async function toggleCmd(name, enabled) {
  try {
    await POST(`/api/commands/${encodeURIComponent(name)}/toggle`,{enabled});
    const c = S.cmds.find(x=>x.name===name); if(c) c.enabled=enabled;
    document.getElementById('cc-'+name)?.classList.toggle('disabled',!enabled);
  } catch(e) { err('Erro',e.message); }
}

async function changePrio(name, delta) {
  const c = S.cmds.find(x=>x.name===name); if(!c) return;
  const np = Math.max(0,(c.priority||0)+delta);
  try {
    await POST(`/api/commands/${encodeURIComponent(name)}/priority`,{priority:np});
    c.priority=np;
    const el = document.getElementById('pv-'+name); if(el) el.textContent=np;
    const meta = document.querySelector(`#cc-${name} .cmd-meta`);
    const badge = meta?.querySelector('.badge-p');
    if(np>0){ if(badge) badge.textContent='P'+np; else meta?.insertAdjacentHTML('beforeend',`<span class="badge badge-p">P${np}</span>`); }
    else badge?.remove();
  } catch(e) { err('Erro prioridade',e.message); }
}

async function editCmd(name) {
  let code='';
  try{ const r=await GET(`/api/commands/${encodeURIComponent(name)}/source`); code=r.source||r.code||''; }catch{}
  const c=S.cmds.find(x=>x.name===name)||{};
  const {el,close} = modal({title:`Editar: ${name}`,icon:ICO.info,wide:true,body:`<textarea class="form-textarea" id="edit-code" style="height:340px;font-size:.78rem">${esc(code)}</textarea>`,
    footer:`<button class="btn btn-secondary" onclick="this.closest('.modal-bg').remove()">Cancelar</button><button class="btn btn-primary" onclick="saveEditCmd('${esc(name)}','${esc(c.category||'misc')}')">💾 Salvar</button>`});
}
async function saveEditCmd(name,cat) {
  const code = document.getElementById('edit-code')?.value.trim();
  if(!code) return warn('Código vazio');
  try{
    await POST(`/api/commands/${encodeURIComponent(name)}/source`,{source:code,category:cat});
    ok('Salvo!',`"${name}" atualizado`);
    document.querySelector('.modal-bg')?.remove();
    await loadCmds();
  }catch(e){err('Erro',e.message);}
}

async function delCmd(name) {
  if (!window.confirm(`Deletar "${name}"?`)) return;
  try{ await DEL(`/api/commands/${encodeURIComponent(name)}`); S.cmds=S.cmds.filter(c=>c.name!==name); renderCmdGrid(); ok('Deletado'); }
  catch(e){err('Erro',e.message);}
}

  const c=S.cmds.find(x=>x.name===name);if(!c)return;

async function saveMetaCmd(name){
  const description=document.getElementById('m-desc')?.value.trim();
  const usage=document.getElementById('m-usage')?.value.trim();
  const cooldown=parseInt(document.getElementById('m-cd')?.value)||0;
  const priority=parseInt(document.getElementById('m-prio')?.value)||0;
  const aliases=(document.getElementById('m-alias')?.value||'').split(',').map(s=>s.trim()).filter(Boolean);
  try{
    await Promise.all([
      PUT(`/api/commands/${encodeURIComponent(name)}/meta`,{description,usage,cooldown}),
      POST(`/api/commands/${encodeURIComponent(name)}/aliases`,{aliases}),
      POST(`/api/commands/${encodeURIComponent(name)}/priority`,{priority}),
    ]);
    ok('Salvo!'); document.querySelector('.modal-bg')?.remove(); await loadCmds();
  }catch(e){err('Erro',e.message);}
}

async function genAI(){
  const desc=document.getElementById('ai-desc')?.value.trim();
  if(!desc) return warn('Descreva o comando');
  const btn=document.getElementById('ai-gen-btn');
  btn.disabled=true; btn.textContent='⏳ Gerando...';
  try{
    const r=await POST('/api/ai/generate-command',{descricao:desc});
    if(r.code){document.getElementById('ai-res').style.display='block';document.getElementById('ai-code').value=r.code;ok('Código gerado!','via '+r.via);}
  }catch(e){err('Erro IA',e.message);}
  finally{btn.disabled=false;btn.textContent='✨ Gerar Código';}
}

async function saveNewCmd(){
  const isAI=document.getElementById('nc-ai')?.classList.contains('active');
  let name,code,category;
  if(isAI){
    code=document.getElementById('ai-code')?.value.trim();
    name=document.getElementById('ai-name')?.value.trim();
    category=document.getElementById('ai-cat')?.value||'misc';

  }else{
    name=document.getElementById('nc-name')?.value.trim();
    code=document.getElementById('nc-code')?.value.trim();
    category=document.getElementById('nc-cat')?.value||'misc';
  }
  if(!name) return warn('Nome obrigatório');
  if(!code) return warn('Código obrigatório');
  try{
    await POST(`/api/commands/${encodeURIComponent(name)}/source`,{source:code,category});
    ok('Criado!',`"${name}" em ${category}`);

function parseBang(raw){
  const parts=raw.trim().split(/\s+/);
  const cmd=parts[0]?.toLowerCase();
  const rest=parts.slice(1);
  if(cmd==='ban'&&rest[0]) return {a:'ban-user',num:rest[0],motivo:rest.slice(1).join(' ')||'via bang'};
  if(cmd==='unban'&&rest[0]) return {a:'unban-user',num:rest[0]};
  if(cmd==='bangroup'&&rest[0]) return {a:'ban-group',jid:rest[0]};
  if(cmd==='unbangroup'&&rest[0]) return {a:'unban-group',jid:rest[0]};
  if(cmd==='send'&&rest.length>=2) return {a:'send',jid:rest[0],text:rest.slice(1).join(' ')};
  if(cmd==='exec'&&rest.length>=2) return {a:'exec',jid:rest[0],command:rest.slice(1).join(' ')};
  return null;
}

async function execBang(){
  const raw=document.getElementById('bang-input')?.value.trim();
  if(!raw) return;
  const cmd=parseBang(raw);
  if(!cmd){warn('Comando não reconhecido','Use: ban NUM | unban NUM | send JID msg | exec JID !cmd');return;}
  try{
    if(cmd.a==='ban-user'){await POST('/api/users/ban',{num:cmd.num,motivo:cmd.motivo});bangLog('🚫',`ban ${cmd.num}`,cmd.motivo);ok(`${cmd.num} banido`);loadBannedUsers();}
    else if(cmd.a==='unban-user'){await DEL(`/api/users/ban/${encodeURIComponent(cmd.num)}`);bangLog('✅',`unban ${cmd.num}`,'ok');ok(`${cmd.num} desbanido`);loadBannedUsers();}
    else if(cmd.a==='ban-group'){await POST('/api/groups/ban',{jid:cmd.jid});bangLog('🔒',`bangroup ${cmd.jid}`,'ok');ok('Grupo banido');loadBannedGroupsQ();}
    else if(cmd.a==='unban-group'){await DEL(`/api/groups/ban/${encodeURIComponent(cmd.jid)}`);bangLog('🔓',`unbangroup ${cmd.jid}`,'ok');ok('Grupo desbanido');loadBannedGroupsQ();}
    else if(cmd.a==='send'){await POST('/api/send',{jid:cmd.jid,text:cmd.text});bangLog('💬',`send → ${cmd.jid}`,cmd.text.slice(0,30));ok('Enviado!');}
    else if(cmd.a==='exec'){const r=await POST('/api/quick/exec',{jid:cmd.jid,command:cmd.command});bangLog('⚡',`exec → ${cmd.jid}`,r.sent||cmd.command);ok('Executado!',r.sent);}
    document.getElementById('bang-input').value='';
  }catch(e){bangLog('❌',cmd.a,e.message,'err');err('Erro',e.message);}
}

function bangLog(icon,action,detail,type='ok'){
  const t=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  _bangHist.unshift({icon,action,detail,type,t});
  if(_bangHist.length>30) _bangHist.pop();
  renderBangHist();
}
function renderBangHist(){
  const el=document.getElementById('bang-hist');if(!el)return;
  if(!_bangHist.length){el.textContent='Nenhuma ação';return;}
  el.innerHTML=_bangHist.map(h=>`<div style="display:flex;gap:6px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03)"><span style="color:var(--dim)">${h.t}</span><span>${h.icon}</span><span style="color:${h.type==='err'?'var(--red)':'var(--accent)'}">${esc(h.action)}</span><span style="color:var(--muted)">${esc(h.detail||'')}</span></div>`).join('');
}

function loadSysTerm(){

      <div class="form-row" style="margin-top:10px">
        <div class="form-group"><input class="form-input mono" id="term-in" placeholder="ls / git status / node --version" autocomplete="off" spellcheck="false"></div>
        <div class="form-group" style="flex:0 0 auto;justify-content:flex-end"><label class="form-label">&nbsp;</label><button class="btn btn-secondary" onclick="runTerm()">▶ Run</button></div>
      </div>
    </div>
    <div class="card">
      <div class="card-hdr"><span class="card-title">Instalar Pacote npm</span></div>
      <div class="form-row">
        <div class="form-group"><input class="form-input" id="npm-pkg" placeholder="axios, lodash..."></div>
        <div class="form-group" style="flex:0 0 auto;justify-content:flex-end"><label class="form-label">&nbsp;</label><button class="btn btn-secondary" onclick="runNpm()">Instalar</button></div>
      </div>
      <div id="npm-res" style="margin-top:8px;display:none"></div>
    </div>`;

  const inp=document.getElementById('term-in');
  const hist=[];let hi=-1;
  inp?.addEventListener('keydown',e=>{
    if(e.key==='Enter'){runTerm();return;}
    if(e.key==='ArrowUp'){hi=Math.min(hi+1,hist.length-1);inp.value=hist[hi]||'';}
    if(e.key==='ArrowDown'){hi=Math.max(hi-1,-1);inp.value=hi>=0?hist[hi]:'';}
  });
  window._termHist=hist;
}

async function runTerm(){
  const inp=document.getElementById('term-in');
  const cmd=inp?.value.trim();if(!cmd)return;
  window._termHist.unshift(cmd);
  const out=document.getElementById('term-out');
  const addLine=(txt,color='#ccc')=>{const d=document.createElement('div');d.style.color=color;d.textContent=txt;out.appendChild(d);out.scrollTop=out.scrollHeight;};
  addLine(`$ ${cmd}`,'#00e676');
  inp.value='';
  try{
    const r=await POST('/api/exec',{cmd});
    (r.stdout||'').split('\n').forEach(l=>l&&addLine(l));
    (r.stderr||'').split('\n').forEach(l=>l&&addLine(l,'#ff5370'));
    if(!r.ok&&r.error) addLine('Erro: '+r.error,'#ff5370');
  }catch(e){addLine('Erro: '+e.message,'#ff5370');}
}

  const phone=document.getElementById('pair-num')?.value.trim().replace(/\D/g,'');
  if(!phone||phone.length<10) return warn('Número inválido');
  try{await POST('/api/pairing',{phone});info('Código solicitado','Aguarde...');}
  catch(e){err('Erro',e.message);}
}
async function cleanAuth(mode){
  if(mode==='full'&&!window.confirm('Reset COMPLETO — vai precisar de novo pareamento!')) return;
  const res=document.getElementById('clean-res');
  res.style.display='block';res.innerHTML='<div class="loading"><div class="spin"></div></div>';
  try{
    const r=await POST('/api/clean-auth',{mode});
    res.innerHTML=r.ok?`<div class="alert alert-ok">${ICO.ok}<div>${esc(r.message)}</div></div>`:`<div class="alert alert-danger">${ICO.err}<div>${esc(r.error||'Erro')}</div></div>`;
  }catch(e){res.innerHTML=`<div class="alert alert-danger">${ICO.err}<div>${esc(e.message)}</div></div>`;}
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
async function init() {
  // Tenta conectar sem senha primeiro
  try {
    const status = await GET('/api/status');
    setStatus(true, status.nome || 'Online');
    if (status.versao) document.getElementById('ver-badge').textContent = 'v'+status.versao;
    initSocket();
    navigate(location.hash.replace('#','') || 'dashboard');
  } catch(e) {
    if (e.message === 'Unauthorized') {
      showAuth();
    } else {
      // Backend offline mas painel deve carregar
      setStatus(false, 'Offline');
      initSocket();
      navigate(location.hash.replace('#','') || 'dashboard');
    }
  }
}

// PWA Service Worker
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')) {
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}

window.addEventListener('DOMContentLoaded', init);
</script>
