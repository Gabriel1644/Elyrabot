<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#08090f">
  <meta name="description" content="Kaius Bot — Painel de controle">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Kaius · Dashboard</title>

  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <link rel="apple-touch-icon" href="/icon-192.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- CodeMirror (editor de código para comandos) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">

  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <!-- ── Sidebar ─────────────────────────────────────── -->
  <nav id="sidebar" class="sidebar">
    <div class="sidebar-logo">
      <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="38" height="38" rx="10" stroke="var(--accent)" stroke-width="1.5"/>
        <circle cx="20" cy="16" r="5" fill="var(--accent)" opacity="0.2"/>
        <circle cx="20" cy="16" r="3" fill="var(--accent)"/>
        <path d="M10 30c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="20" cy="16" r="7" stroke="var(--accent)" stroke-width="1" opacity="0.4"/>
      </svg>
      <div class="logo-text">
        <span class="logo-name">Kaius</span>
        <span class="logo-sub">Dashboard</span>
      </div>
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Fechar menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- Bot status chip -->
    <div class="bot-status-chip" id="botStatusChip">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Verificando...</span>
    </div>

    <!-- Nav items -->
    <nav class="nav-list" role="navigation">
      <a class="nav-item active" data-page="dashboard" href="#dashboard">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Dashboard</span>
      </a>
      <a class="nav-item" data-page="logs" href="#logs">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Logs</span>
        <span class="nav-badge" id="logsBadge" style="display:none">0</span>
      </a>
      <a class="nav-item" data-page="commands" href="#commands">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        <span>Comandos</span>
      </a>
      <a class="nav-item" data-page="automations" href="#automations">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M5.34 17.66l-1.41 1.41M20 12h2M2 12h2M19.07 19.07l-1.41-1.41M5.34 6.34L3.93 4.93M12 20v2M12 2v2"/></svg>
        <span>Automações</span>
      </a>
      <a class="nav-item" data-page="webhooks" href="#webhooks">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
        <span>Webhooks</span>
      </a>
      <a class="nav-item" data-page="groups" href="#groups">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        <span>Grupos</span>
      </a>
      <a class="nav-item" data-page="users" href="#users">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Usuários</span>
      </a>
      <a class="nav-item" data-page="bang" href="#bang">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        <span>Ações Rápidas</span>
      </a>
      <a class="nav-item" data-page="config" href="#config">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span>Configurações</span>
      </a>
      <a class="nav-item" data-page="system" href="#system">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        <span>Sistema</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <span id="sidebarVersion" class="sidebar-version">v—</span>
      <button class="btn-icon" id="reloadBtn" title="Recarregar comandos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
      </button>
    </div>
  </nav>

  <!-- ── Overlay (mobile) ─────────────────────────────── -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ── Main ─────────────────────────────────────────── -->
  <div class="layout">
    <!-- Top bar -->
    <header class="topbar">
      <button class="btn-icon" id="menuBtn" aria-label="Abrir menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1 class="topbar-title" id="pageTitle">Dashboard</h1>
      <div class="topbar-actions">
        <div class="connection-indicator" id="connectionIndicator" title="Conexão com o servidor">
          <span class="conn-dot"></span>
        </div>
      </div>
    </header>

    <!-- Page content -->
    <main id="pageContent" class="page-content">
      <!-- Injetado dinamicamente pelo router -->
    </main>
  </div>

  <!-- ── Toast container ──────────────────────────────── -->
  <div id="toastContainer" class="toast-container" aria-live="polite"></div>

  <!-- ── Auth Modal ────────────────────────────────────── -->
  <div id="authModal" class="modal-backdrop" style="display:none">
    <div class="modal" style="max-width:380px">
      <div class="modal-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8" style="width:28px;height:28px"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <h2>Autenticação</h2>
      </div>
      <p class="modal-desc">Este painel está protegido. Insira a senha para continuar.</p>
      <div class="form-group">
        <label class="form-label">Senha do painel</label>
        <input type="password" id="authInput" class="form-input" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-primary btn-block" id="authSubmit">Entrar</button>
    </div>
  </div>

  <!-- ── Scripts ───────────────────────────────────────── -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>

  <!-- Componentes (ordem importa) -->
  <script src="/assets/icons.js"></script>
  <script src="/components/Dashboard.js"></script>
  <script src="/components/Logs.js"></script>
  <script src="/components/Commands.js"></script>
  <script src="/components/Automations.js"></script>
  <script src="/components/Webhooks.js"></script>
  <script src="/components/Groups.js"></script>
  <script src="/components/Users.js"></script>
  <script src="/components/Config.js"></script>
  <script src="/components/BangPanel.js"></script>
  <script src="/components/System.js"></script>
  <!-- App principal (inicializa por último) -->
  <script src="/app.js"></script>
  <script src="/pwa-patch.js"></script>
</body>
</html>
