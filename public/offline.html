<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaius · Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #08090f;
      color: #e2e8f0;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 400px; }
    .icon { margin-bottom: 24px; opacity: 0.4; }
    .icon svg { width: 64px; height: 64px; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; color: #00e87a; }
    p { color: #6b7894; font-size: 0.9rem; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: #00e87a;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover { background: #00b85f; }
    .version { margin-top: 32px; font-family: monospace; font-size: 0.7rem; color: #3d4460; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#00e87a" stroke-width="1.5">
        <path d="M1 6l10.5 7.5L22 6"/>
        <path d="M22 6H2a1 1 0 00-1 1v10a1 1 0 001 1h20a1 1 0 001-1V7a1 1 0 00-1-1z"/>
        <line x1="1" y1="20" x2="9" y2="12"/>
        <line x1="23" y1="20" x2="15" y2="12"/>
      </svg>
    </div>
    <h1>Sem conexão</h1>
    <p>O painel do Kaius não consegue se conectar ao servidor.<br>Verifique se o bot está rodando e tente novamente.</p>
    <a class="btn" href="/" onclick="location.reload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
      </svg>
      Tentar novamente
    </a>
    <div class="version">Kaius Dashboard v31 — PWA offline</div>
  </div>
</body>
</html>
