<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0b14"/>
      <stop offset="100%" style="stop-color:#1a1d35"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e676"/>
      <stop offset="100%" style="stop-color:#00b0ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.3"/>
  <!-- Bot head -->
  <rect x="156" y="168" width="200" height="170" rx="28" fill="url(#accent)" filter="url(#glow)"/>
  <!-- Eyes -->
  <rect x="196" y="210" width="44" height="44" rx="12" fill="#0a0b14"/>
  <rect x="272" y="210" width="44" height="44" rx="12" fill="#0a0b14"/>
  <!-- Eye glow dots -->
  <circle cx="218" cy="232" r="8" fill="#00e676"/>
  <circle cx="294" cy="232" r="8" fill="#00e676"/>
  <!-- Antenna -->
  <rect x="248" y="118" width="16" height="52" rx="8" fill="url(#accent)" opacity="0.8"/>
  <circle cx="256" cy="110" r="14" fill="#00e676" filter="url(#glow)"/>
  <!-- Mouth -->
  <rect x="196" y="284" width="120" height="28" rx="14" fill="#0a0b14"/>
  <!-- Smile dots -->
  <circle cx="216" cy="298" r="5" fill="#00e676"/>
  <circle cx="236" cy="298" r="5" fill="#00e676"/>
  <circle cx="256" cy="298" r="5" fill="#00e676"/>
  <circle cx="276" cy="298" r="5" fill="#00e676"/>
  <circle cx="296" cy="298" r="5" fill="#00e676"/>
  <!-- Body connectors -->
  <rect x="188" y="338" width="24" height="36" rx="8" fill="url(#accent)" opacity="0.6"/>
  <rect x="300" y="338" width="24" height="36" rx="8" fill="url(#accent)" opacity="0.6"/>
  <!-- Body -->
  <rect x="188" y="370" width="136" height="44" rx="16" fill="url(#accent)" opacity="0.4"/>
  <!-- Code lines decoration -->
  <rect x="174" y="120" width="40" height="4" rx="2" fill="#00e676" opacity="0.2"/>
  <rect x="174" y="130" width="28" height="4" rx="2" fill="#00e676" opacity="0.15"/>
  <rect x="298" y="120" width="40" height="4" rx="2" fill="#00e676" opacity="0.2"/>
  <rect x="310" y="130" width="28" height="4" rx="2" fill="#00e676" opacity="0.15"/>
</svg>
